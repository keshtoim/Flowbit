name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Сборка APK
    runs-on: ubuntu-latest

    steps:
      - name: Получение кода
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Настройка JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Права на выполнение gradlew
        run: chmod +x gradlew

      - name: Кэш Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Сборка debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Сохранение APK
        uses: actions/upload-artifact@v4
        with:
          name: flowbit-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  test:
    name: Запуск тестов
    runs-on: ubuntu-latest

    steps:
      - name: Получение кода
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Настройка JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Права на выполнение gradlew
        run: chmod +x gradlew

      - name: Запуск unit-тестов
        run: ./gradlew test --no-daemon

      - name: Отчёт о тестах
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ github.run_number }}
          path: app/build/reports/tests/
          retention-days: 7
